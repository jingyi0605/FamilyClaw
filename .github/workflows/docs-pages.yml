name: 发布文档到 GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/Documentation/**
      - package.json
      - package-lock.json
      - .github/workflows/docs-pages.yml
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: 构建文档
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: 计算文档基础路径
        id: docs-base
        shell: bash
        env:
          DOCS_BASE_OVERRIDE: ${{ vars.DOCS_BASE }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"

          if [ -n "${DOCS_BASE_OVERRIDE}" ]; then
            docs_base="${DOCS_BASE_OVERRIDE}"
          elif [[ "${repo_name}" == *.github.io ]]; then
            docs_base="/"
          else
            docs_base="/${repo_name}/"
          fi

          echo "value=${docs_base}" >> "${GITHUB_OUTPUT}"
          echo "DOCS_BASE=${docs_base}" >> "${GITHUB_ENV}"

      - name: 安装依赖
        run: npm ci

      - name: 构建 VitePress 文档
        run: npm run docs:build

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/Documentation/.vitepress/dist

  deploy:
    name: 部署文档
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
